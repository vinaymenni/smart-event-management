<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Announcements')}"></head>

<body class="dashboard-body">

    <th:block th:replace="~{fragments/layout :: admin-nav(${admin})}"></th:block>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1><i class="fas fa-bullhorn"></i> Announcements</h1>
                <p class="page-subtitle">Post announcements for students.</p>
            </div>
        </div>

        <div th:replace="~{fragments/layout :: flash-messages}"></div>

        <div class="dashboard-grid">
            <!-- Post announcement form -->
            <div class="form-card" style="flex:1">
                <h3><i class="fas fa-plus-circle"></i> Post Announcement</h3>
                <form th:action="@{/admin/announcements}" method="post" class="event-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" name="title" class="form-control" placeholder="Announcement subject"
                            required />
                    </div>
                    <div class="form-group">
                        <label>Message *</label>
                        <textarea name="message" class="form-control" rows="4"
                            placeholder="Write your announcement here..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Link to Event (optional)</label>
                        <select name="eventId" class="form-control">
                            <option value="">-- No Specific Event --</option>
                            <option th:each="e : ${events}" th:value="${e.id}" th:text="${e.title}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Post
                        Announcement</button>
                </form>
            </div>

            <!-- Announcement list -->
            <div class="dashboard-section side-section" style="flex:1">
                <h3><i class="fas fa-list"></i> All Announcements</h3>
                <div class="announcement-list">
                    <div th:each="ann : ${announcements}" class="announcement-item">
                        <div class="ann-title" th:text="${ann.title}">Title</div>
                        <div class="ann-message" th:text="${ann.message}">Message</div>
                        <div class="ann-meta">
                            <span th:text="'By: ' + ${ann.postedBy.name}">Admin</span>
                            <span th:if="${ann.event != null}" th:text="' | Event: ' + ${ann.event.title}">Event</span>
                            <span th:text="${#temporals.format(ann.createdAt,'dd MMM yyyy HH:mm')}">Date</span>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(announcements)}" class="no-content">
                        <i class="fas fa-bell-slash"></i>
                        <p>No announcements yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:src="@{/js/main.js}"></script>
</body>

</html>
