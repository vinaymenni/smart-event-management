<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration | Smart Campus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-left-content">
                <div class="auth-logo"><i class="fas fa-user-graduate"></i></div>
                <h1>Student Portal</h1>
                <p>Join Smart Campus today</p>
                <div class="auth-features">
                    <div class="feature-item"><i class="fas fa-calendar-check"></i><span>Browse &amp; Register for
                            Events</span></div>
                    <div class="feature-item"><i class="fas fa-ticket-alt"></i><span>Get Digital Tickets</span></div>
                    <div class="feature-item"><i class="fas fa-star"></i><span>Share Your Feedback</span></div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-card">
                <div class="auth-header">
                    <h2><i class="fas fa-user-graduate"></i> Student Registration</h2>
                    <p>Create your student account</p>
                </div>

                <div th:if="${emailError}" class="auth-alert auth-alert-danger">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${emailError}"></span>
                </div>
                <div th:if="${passwordError}" class="auth-alert auth-alert-danger">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${passwordError}"></span>
                </div>
                <div th:if="${usernameError}" class="auth-alert auth-alert-danger">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${usernameError}"></span>
                </div>

                <form th:action="@{/register/student}" th:object="${userDto}" method="post" class="auth-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="form-row">
                        <div class="form-group">
                            <label for="name"><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control"
                                placeholder="Your full name" required />
                            <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                        </div>
                        <div class="form-group">
                            <label for="phone"><i class="fas fa-phone"></i> Phone</label>
                            <input type="tel" id="phone" th:field="*{phone}" class="form-control"
                                placeholder="10-digit number" />
                            <span class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control"
                            placeholder="college@email.com" required />
                        <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                    </div>

                    <div class="form-group">
                        <label for="username"><i class="fas fa-user-tag"></i> Username</label>
                        <input type="text" id="username" th:field="*{username}" class="form-control"
                            placeholder="e.g. kusuma_23" required />
                        <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                    </div>

                    <div class="form-group">
                        <label for="department"><i class="fas fa-building"></i> Department</label>
                        <select id="department" th:field="*{department}" class="form-control">
                            <option value="">-- Select Department --</option>
                            <option th:each="dept : ${departments}" th:value="${dept.name()}"
                                th:text="${dept.displayName}"></option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password"><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="password" th:field="*{password}" class="form-control"
                                placeholder="Min 6 characters" required />
                            <span class="field-error" th:if="${#fields.hasErrors('password')}"
                                th:errors="*{password}"></span>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                class="form-control" placeholder="Repeat password" required />
                        </div>
                    </div>

                    <button type="submit" class="btn-auth-primary">
                        <i class="fas fa-user-plus"></i> Create Student Account
                    </button>
                </form>

                <div class="auth-divider"><span>Already have an account?</span></div>
                <a th:href="@{/login}" class="btn-auth-secondary">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </a>
            </div>
        </div>
    </div>
</body>

</html>
