<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Saved Events')}"></head>

<body class="dashboard-body">

    <th:block th:replace="~{fragments/layout :: student-nav(${student})}"></th:block>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1><i class="fas fa-bookmark"></i> Saved Events</h1>
                <p class="page-subtitle">Quick access to events you bookmarked.</p>
            </div>
        </div>

        <div th:replace="~{fragments/layout :: flash-messages}"></div>

        <div class="event-cards-grid large-grid">
            <div th:each="b : ${bookmarks}" class="event-card">
                <div class="event-card-top">
                    <span class="dept-badge" th:text="${b.event.department}">CSE</span>
                    <div style="display:flex;gap:8px;align-items:center">
                        <form th:action="@{/student/events/{id}/unbookmark(id=${b.event.id})}" method="post"
                            title="Remove from saved">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="icon-btn" aria-label="Unbookmark">
                                <i class="fas fa-bookmark"></i>
                            </button>
                        </form>
                        <span class="status-badge"
                            th:classappend="${b.event.status.name() == 'UPCOMING'} ? 'status-upcoming' : (${b.event.status.name() == 'ONGOING'} ? 'status-ongoing' : 'status-completed')"
                            th:text="${b.event.status}">Status</span>
                    </div>
                </div>
                <h3 class="event-title" th:text="${b.event.title}">Event Title</h3>
                <p class="event-desc" th:text="${#strings.abbreviate(b.event.description, 100)}">Description...</p>
                <div class="event-meta">
                    <span><i class="fas fa-map-marker-alt"></i> <span th:text="${b.event.venue}">Venue</span></span>
                    <span><i class="fas fa-calendar-day"></i>
                        <span th:text="${#temporals.format(b.event.startDate, 'dd MMM yyyy')}">Date</span>
                        –
                        <span th:text="${#temporals.format(b.event.endDate, 'dd MMM yyyy')}">Date</span>
                    </span>
                    <span th:if="${b.event.timing != null and !#strings.isEmpty(b.event.timing)}"><i
                            class="fas fa-clock"></i>
                        <span th:text="${b.event.timing}">10:00 AM</span>
                    </span>
                    <span><i class="fas fa-chair"></i>
                        <span th:text="${b.event.availableSeats}">50</span> seats left
                    </span>
                </div>
                <div class="event-type-tag" th:text="${b.event.eventType}">Workshop</div>
                <a th:href="@{/student/events/{id}(id=${b.event.id})}" class="btn-card">
                    <i class="fas fa-arrow-right"></i> View Event
                </a>
            </div>

            <div th:if="${#lists.isEmpty(bookmarks)}" class="no-content wide">
                <i class="far fa-bookmark"></i>
                <p>No saved events yet.</p>
                <a th:href="@{/student/events}" class="btn-primary"><i class="fas fa-calendar-alt"></i> Browse Events</a>
            </div>
        </div>
    </main>

    <script th:src="@{/js/main.js}"></script>
</body>

</html>
