# ===== Application =====
spring.application.name=Smart Campus Event Management System
server.port=8080

# ===== H2 Database =====
spring.datasource.url=jdbc:h2:mem:smartcampusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===== Logging =====
logging.level.com.smartcampus=INFO
logging.level.org.springframework.security=WARN

# ===== MAIL SMTP CONFIGURATION =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Set these with your real Gmail + App Password, or via env vars MAIL_USERNAME / MAIL_PASSWORD
spring.mail.username=vinaymenni9@gmail.com
spring.mail.password=yolmcmwqbzhwszew
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=false

# ===== Task Scheduling =====
spring.task.scheduling.pool.size=2
