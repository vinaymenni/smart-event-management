<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Analytics')}"></head>

<body class="dashboard-body">

    <th:block th:replace="~{fragments/layout :: admin-nav(${admin})}"></th:block>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1><i class="fas fa-chart-bar"></i> Analytics</h1>
                <p class="page-subtitle">Event participation and registration statistics.</p>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="stats-grid four-col">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="stat-info">
                    <h3 th:text="${totalEvents}">0</h3>
                    <p>Total Events</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                <div class="stat-info">
                    <h3 th:text="${totalRegistrations}">0</h3>
                    <p>Total Registrations</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-building"></i></div>
                <div class="stat-info">
                    <h3 th:text="${#maps.size(regByDeptMap)}">0</h3>
                    <p>Departments Active</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-tag"></i></div>
                <div class="stat-info">
                    <h3 th:text="${#maps.size(eventsByTypeMap)}">0</h3>
                    <p>Event Types</p>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="analytics-grid">
            <!-- Department-wise Registrations -->
            <div class="chart-card">
                <h3><i class="fas fa-building"></i> Registrations by Department</h3>
                <div class="bar-chart-container">
                    <div th:each="entry : ${regByDeptMap}" class="bar-row">
                        <div class="bar-label" th:text="${entry.key}">CSE</div>
                        <div class="bar-track">
                            <div class="bar-fill"
                                th:style="'width:' + (${totalRegistrations > 0} ? ${entry.value * 100 / totalRegistrations} : 0) + '%'">
                            </div>
                        </div>
                        <div class="bar-value" th:text="${entry.value}">0</div>
                    </div>
                    <p th:if="${#maps.isEmpty(regByDeptMap)}" class="text-muted">No registration data yet.</p>
                </div>
            </div>

            <!-- Events by Department -->
            <div class="chart-card">
                <h3><i class="fas fa-calendar-check"></i> Events by Department</h3>
                <div class="bar-chart-container">
                    <div th:each="entry : ${eventsByDeptMap}" class="bar-row">
                        <div class="bar-label" th:text="${entry.key}">CSE</div>
                        <div class="bar-track">
                            <div class="bar-fill bar-fill-alt"
                                th:style="'width:' + (${totalEvents > 0} ? ${entry.value * 100 / totalEvents} : 0) + '%'">
                            </div>
                        </div>
                        <div class="bar-value" th:text="${entry.value}">0</div>
                    </div>
                    <p th:if="${#maps.isEmpty(eventsByDeptMap)}" class="text-muted">No event data yet.</p>
                </div>
            </div>

            <!-- Events by Type -->
            <div class="chart-card wide">
                <h3><i class="fas fa-tag"></i> Events by Type</h3>
                <div class="type-grid">
                    <div th:each="entry : ${eventsByTypeMap}" class="type-stat-card">
                        <div class="type-count" th:text="${entry.value}">0</div>
                        <div class="type-name" th:text="${entry.key}">Type</div>
                    </div>
                    <p th:if="${#maps.isEmpty(eventsByTypeMap)}" class="text-muted">No event data yet.</p>
                </div>
            </div>
        </div>
    </main>

    <script th:src="@{/js/main.js}"></script>
</body>

</html>
