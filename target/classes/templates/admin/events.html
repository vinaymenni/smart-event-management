<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Manage Events')}"></head>

<body class="dashboard-body">

    <th:block th:replace="~{fragments/layout :: admin-nav(${admin})}"></th:block>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1><i class="fas fa-calendar-alt"></i> Manage Events</h1>
                <p class="page-subtitle">Create, edit, and delete campus events.</p>
            </div>
            <a th:href="@{/admin/events/new}" class="btn-primary"><i class="fas fa-plus"></i> Create Event</a>
        </div>

        <div th:replace="~{fragments/layout :: flash-messages}"></div>

        <!-- Search/Filter Bar -->
        <div class="filter-card">
            <form th:action="@{/admin/events}" method="get" class="filter-form">
                <div class="filter-group">
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Search events..."
                        class="form-control" />
                </div>
                <div class="filter-group">
                    <select name="department" class="form-control">
                        <option value="">All Departments</option>
                        <option th:each="dept : ${departments}" th:value="${dept.name()}" th:text="${dept.displayName}"
                            th:selected="${dept.name() == department}"></option>
                    </select>
                </div>
                <div class="filter-group">
                    <select name="eventType" class="form-control">
                        <option value="">All Types</option>
                        <option
                            th:each="type : ${ {'Workshop','Seminar','Technical','Cultural','Sports','Competition','Guest Lecture'} }"
                            th:value="${type}" th:text="${type}" th:selected="${type == eventType}"></option>
                    </select>
                </div>
                <button type="submit" class="btn-primary"><i class="fas fa-search"></i> Filter</button>
                <a th:href="@{/admin/events}" class="btn-secondary"><i class="fas fa-times"></i> Clear</a>
            </form>
        </div>

        <div class="table-card">
            <table class="data-table" th:if="${events.totalElements > 0}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Dept</th>
                        <th>Type</th>
                        <th>Start Date</th>
                        <th>Last Apply</th>
                        <th>Seats</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event, stat : ${events.content}">
                        <td th:text="${stat.count + (currentPage * 10)}">1</td>
                        <td>
                            <strong th:text="${event.title}">Title</strong>
                            <div class="sub-text" th:text="${event.venue}">Venue</div>
                        </td>
                        <td><span class="dept-badge sm" th:text="${event.department}">CSE</span></td>
                        <td th:text="${event.eventType}">Workshop</td>
                        <td th:text="${#temporals.format(event.startDate,'dd MMM yyyy')}">Date</td>
                        <td>
                            <span th:text="${#temporals.format(event.lastDateToApply,'dd MMM yyyy')}">Date</span>
                            <span th:if="${event.registrationOpen}" class="reg-open-sm">Open</span>
                            <span th:unless="${event.registrationOpen}" class="reg-closed-sm">Closed</span>
                        </td>
                        <td>
                            <div class="seat-bar">
                                <div class="seat-fill"
                                    th:style="'width:' + (${event.seatLimit > 0} ? ${event.registeredCount * 100 / event.seatLimit} : 0) + '%'">
                                </div>
                            </div>
                            <span th:text="${event.registeredCount + '/' + event.seatLimit}">0/100</span>
                        </td>
                        <td>
                            <span class="status-badge"
                                th:classappend="${event.status.name() == 'UPCOMING'} ? 'status-upcoming' : (${event.status.name() == 'ONGOING'} ? 'status-ongoing' : 'status-completed')"
                                th:text="${event.status}">Status</span>
                        </td>
                        <td class="action-btns">
                            <a th:href="@{/admin/events/{id}/edit(id=${event.id})}" class="btn-edit-sm" title="Edit">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/admin/registrations(eventId=${event.id})}" class="btn-view-sm"
                                title="View Registrations">
                                <i class="fas fa-users"></i>
                            </a>
                            <form th:action="@{/admin/events/{id}/delete(id=${event.id})}" method="post"
                                style="display:inline"
                                onsubmit="return confirm('Are you sure you want to delete this event?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn-danger-sm" title="Delete"><i
                                        class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${events.totalElements == 0}" class="no-content">
                <i class="fas fa-calendar-times"></i>
                <p>No events found. Create your first event!</p>
                <a th:href="@{/admin/events/new}" class="btn-primary"><i class="fas fa-plus"></i> Create Event</a>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" th:if="${totalPages > 1}">
            <a th:if="${currentPage > 0}"
                th:href="@{/admin/events(page=${currentPage-1}, keyword=${keyword}, department=${department}, eventType=${eventType})}"
                class="page-btn"><i class="fas fa-chevron-left"></i> Prev</a>
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:href="@{/admin/events(page=${i}, keyword=${keyword}, department=${department}, eventType=${eventType})}"
                    th:text="${i + 1}" th:classappend="${i == currentPage} ? 'page-btn active' : 'page-btn'"></a>
            </span>
            <a th:if="${currentPage < totalPages - 1}"
                th:href="@{/admin/events(page=${currentPage+1}, keyword=${keyword}, department=${department}, eventType=${eventType})}"
                class="page-btn">Next <i class="fas fa-chevron-right"></i></a>
        </div>
    </main>

    <script th:src="@{/js/main.js}"></script>
</body>

</html>
